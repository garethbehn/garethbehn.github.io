<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent — Gareth Behn</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --bg-elevated: #131318;
    --bg-card: #1a1a22;
    --text-primary: #f0efe8;
    --text-secondary: #9b99a9;
    --accent: #4aff8c;
    --accent-dim: #2bcc6a;
    --accent-glow: rgba(74, 255, 140, 0.15);
    --border: rgba(255, 255, 255, 0.06);
    --border-hover: rgba(74, 255, 140, 0.3);
    --font-display: 'Bricolage Grotesque', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-primary);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  ::selection {
    background: var(--accent);
    color: var(--bg);
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.25rem 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(20px);
    background: rgba(10, 10, 12, 0.8);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    text-decoration: none;
  }

  .logo span { color: var(--accent); }

  .thankyou-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8rem 2.5rem 4rem;
    position: relative;
    overflow: hidden;
  }

  .thankyou-wrapper::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60vw; height: 60vw;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74, 255, 140, 0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .thankyou-content {
    text-align: center;
    max-width: 550px;
    position: relative;
    z-index: 1;
  }

  .thankyou-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--accent-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 2rem;
    animation: scaleIn 0.5s ease forwards;
  }

  .thankyou-icon svg {
    width: 40px; height: 40px;
    color: var(--accent);
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .thankyou-content h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(2rem, 4vw, 3rem);
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }

  .thankyou-content h1 span { color: var(--accent); }

  .thankyou-content p {
    font-size: 1.1rem;
    line-height: 1.7;
    color: var(--text-secondary);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1rem;
    padding: 1rem 2rem;
    border-radius: 8px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.3s;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.6s;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px var(--accent-glow);
  }

  .btn-primary svg { transition: transform 0.2s; }
  .btn-primary:hover svg { transform: translateX(-3px); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  footer {
    padding: 2.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-left {
    font-size: 0.8rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
  }

  .footer-links { display: flex; gap: 1.5rem; }

  .footer-links a {
    font-size: 0.8rem;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.3s;
  }

  .footer-links a:hover { color: var(--accent); }

  @media (max-width: 600px) {
    nav { padding: 1rem 1.25rem; }
    .thankyou-wrapper { padding: 8rem 1.25rem 4rem; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Gareth <span>Behn</span></a>
</nav>

<div class="thankyou-wrapper">
  <div class="thankyou-content">
    <div class="thankyou-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Message <span>received.</span></h1>
    <p>Thanks for reaching out — I'll get back to you within 24 hours. In the meantime, feel free to connect with me on LinkedIn.</p>
    <a href="index.html" class="btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Home
    </a>
  </div>
</div>

<footer>
  <div class="footer-left">
    <a href="index.html" class="logo" style="font-size: 1.2rem;">Gareth <span>Behn</span></a>
    <span style="margin-left: 1rem; font-size: 0.8rem; color: var(--text-secondary);">© 2026 Gareth Behn. All rights reserved.</span>
  </div>
  <div class="footer-links">
    <a href="https://www.linkedin.com/in/gareth-behn-5b3425111" target="_blank">LinkedIn</a>
    <a href="mailto:garethbehn@gmail.com">garethbehn@gmail.com</a>
  </div>
</footer>

</body>
</html>
